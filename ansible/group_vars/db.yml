---
# ansible/group_vars/db.yml
# PostgreSQL-specific variables for the db host group.

pg_version: 16

# ── Performance tuning ────────────────────────────────────────────────────────
# Memory settings are derived at play time from the host's actual RAM
# (ansible_memtotal_mb) so the cluster is startable on any VM size.
# 25 % of total RAM for shared_buffers; 75 % for effective_cache_size.
# maintenance_work_mem is 5 % of RAM, clamped to [64 MB, 2 GB].
# Override individual settings in host_vars or with -e if needed.
pg_shared_buffers:           "{{ (ansible_memtotal_mb * 0.25) | int }}MB"
pg_effective_cache_size:     "{{ (ansible_memtotal_mb * 0.75) | int }}MB"
# clamp(5 % of RAM, min=64 MB, max=2 GB)
pg_maintenance_work_mem:     "{{ [[ansible_memtotal_mb // 20, 64] | max, 2048] | min }}MB"
pg_work_mem:                 "32MB"
pg_wal_buffers:              "16MB"
pg_min_wal_size:             "2GB"
pg_max_wal_size:             "8GB"
pg_checkpoint_completion_target: "0.9"
pg_default_statistics_target: 100
pg_random_page_cost:         "1.1"
pg_effective_io_concurrency: 200
pg_max_worker_processes:     8
pg_max_parallel_workers_per_gather: 4
pg_max_parallel_workers:     8
pg_max_connections:          400
