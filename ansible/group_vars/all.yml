---
# ansible/group_vars/all.yml
# Variables shared by every host in the inventory.

# ── OJP release ──────────────────────────────────────────────────────────────
ojp_version: "0.4.11-beta"

# ── PostgreSQL JDBC driver (used by OJP proxy nodes) ─────────────────────────
pg_jdbc_driver_version: "42.7.8"

# ── Database credentials ──────────────────────────────────────────────────────
# Override db_password with an Ansible Vault secret in production.
db_name:     benchdb
db_user:     benchuser
db_password: benchpass
db_port:     5432

# ── OJP proxy port (must match ojp_server_port in group_vars/ojp.yml) ────────
ojp_server_port:  1059

# ── pgBouncer settings (SUT-C) ────────────────────────────────────────────────
# pool_size per pgBouncer instance. The production topology has 3 pgBouncer nodes.
# 16 per node × 3 nodes = 48 intended PostgreSQL backend connections.
# min_pool_size = pool_size pre-warms all server connections at startup so
# pg_stat_activity always shows the full backend count during benchmarks.
pgbouncer_port:          6432
pgbouncer_pool_size:     16
pgbouncer_min_pool_size: 16
pgbouncer_reserve_pool_size: 0
# Bench-side local client pool against pgBouncer endpoint.
# Used in ansible/templates/pgbouncer-benchmark.yaml.j2 as benchmark poolSize,
# then consumed by src/main/java/com/bench/config/PgbouncerProvider.java.
# Production-topology default keeps realistic Java local pooling.
pgbouncer_local_pool_size: 20

# ── Benchmark run defaults ────────────────────────────────────────────────────
bench_replica_count:        16
bench_target_rps:           500
bench_warmup_seconds:       300
bench_duration_seconds:     1800
bench_cooldown_seconds:     120
bench_repetitions:          5
bench_slo_p95_ms:           50
bench_workload_type:        "W2_MIXED"
bench_connection_mode:      "OJP"
bench_db_connection_budget: 18

# ── HikariCP Direct (SUT-A) defaults ─────────────────────────────────────────
# Production: bench_db_connection_budget=300, bench_replica_count=16.
# Each replica holds floor(dbConnectionBudget / replicas) connections, capped at
# bench_hikari_max_pool_size_per_replica (300 / 16 ≈ 19 per replica = 300 total).
bench_hikari_max_pool_size_per_replica: 19

# ── Benchmark dataset size (must match init-db call) ─────────────────────────
bench_num_accounts: 1000000
bench_num_items:    100000
bench_num_orders:   10000000
bench_seed:         0.42

# ── Paths on the control node ─────────────────────────────────────────────────
# playbook_dir resolves to ansible/playbooks/ — go two levels up to reach the repo root.
bench_repo_dir:   "{{ playbook_dir }}/../.."
bench_results_dir: "{{ bench_repo_dir }}/results"
bench_binary:     "{{ bench_repo_dir }}/build/install/ojp-performance-tester/bin/bench"
