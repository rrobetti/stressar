---
# ansible/playbooks/teardown.yml
#
# Gracefully stops services on proxy/lb nodes and resets PostgreSQL
# statistics so the next run starts from a clean baseline.
#
# Usage:
#   # Stop everything (OJP + pgBouncer + HAProxy) and reset DB stats:
#   ansible-playbook -i inventory.yml playbooks/teardown.yml
#
#   # Reset DB stats only (service management handled manually):
#   ansible-playbook -i inventory.yml playbooks/teardown.yml --skip-tags ojp,pgbouncer,haproxy

- name: Stop OJP Server on proxy nodes
  hosts: proxy
  gather_facts: false
  tags: ojp
  tasks:
    - name: Stop ojp-server service
      ansible.builtin.systemd:
        name: ojp-server
        state: stopped
      become: true
      ignore_errors: true   # tolerate if already stopped

    - name: Confirm OJP port {{ ojp_server_port }} is closed
      ansible.builtin.wait_for:
        port: "{{ ojp_server_port }}"
        state: stopped
        timeout: 15
      ignore_errors: true

- name: Stop pgBouncer on proxy nodes
  hosts: proxy
  gather_facts: false
  tags: pgbouncer
  tasks:
    - name: Stop pgbouncer service
      ansible.builtin.systemd:
        name: pgbouncer
        state: stopped
      become: true
      ignore_errors: true   # tolerate if not installed / already stopped

    - name: Confirm pgBouncer port {{ pgbouncer_port }} is closed
      ansible.builtin.wait_for:
        port: "{{ pgbouncer_port }}"
        state: stopped
        timeout: 15
      ignore_errors: true

- name: Stop HAProxy on load balancer node
  hosts: lb
  gather_facts: false
  tags: haproxy
  tasks:
    - name: Stop haproxy service
      ansible.builtin.systemd:
        name: haproxy
        state: stopped
      become: true
      ignore_errors: true   # tolerate if not installed / already stopped

- name: Reset PostgreSQL statistics on database server
  hosts: db
  gather_facts: false
  tasks:
    - name: Reset pg_stat_statements
      become: true
      become_user: postgres
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        query: "SELECT pg_stat_statements_reset();"
      ignore_errors: true   # extension may not be loaded yet on first run

    - name: Reset pg_stat_bgwriter / pg_stat_database counters
      become: true
      become_user: postgres
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        query: "SELECT pg_stat_reset();"
