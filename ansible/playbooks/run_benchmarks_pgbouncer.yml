---
# ansible/playbooks/run_benchmarks_pgbouncer.yml
#
# Executes the PgBouncer benchmark suite (SUT-C) from the control node:
#   1. Pre-flight: verifies pgbouncer.service is active on every proxy node and
#      haproxy.service is active on the lb node — fails fast if any are down.
#      Re-run setup.yml --tags pgbouncer,haproxy to bring them up.
#   2. Renders a bench config from the pgBouncer Jinja2 template.
#   3. Resets PostgreSQL statistics so the run starts from a clean baseline.
#   4. Deploys and starts side-car metric collectors on proxy, lb, and DB nodes.
#   5. Runs a warmup pass (single instance on loadgen).
#   6. Launches {{ bench_replica_count }} bench JVMs in parallel on loadgen hosts.
#   7. Waits for all replicas to finish.
#   8. Stops all side-car collectors and fetches their CSVs to the control node.
#   9. Runs generate_report.sh to produce a Markdown report.
#
# Side-car scripts:
#   ansible/scripts/collect_pg_metrics.sh        — runs on the DB node; polls
#       pg_stat_database, pg_stat_bgwriter, and pg_locks every 5 seconds.
#   ansible/scripts/collect_process_metrics.sh   — runs on each pgbouncer node,
#       the haproxy node, and the DB node (postgresql);
#       captures OS-level CPU% and RSS/VSZ once per second.
#
# Prerequisites (infrastructure must be set up before running this playbook):
#   - PostgreSQL installed and running  → setup.yml --tags db
#   - pgBouncer running on pgbouncer nodes → setup.yml --tags pgbouncer
#   - HAProxy running on haproxy node      → setup.yml --tags haproxy
#   - bench tool built                  → setup.yml --tags bench,init-db
#   - Inventory must define haproxy, db, pgbouncer, loadgen, and control groups
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/run_benchmarks_pgbouncer.yml
#
# Optional overrides:
#   -e run_name=pgbouncer-run-1
#   -e bench_target_rps=40
#   -e bench_duration_seconds=300
#   -e bench_replica_count=4

- name: Pre-flight — verify pgBouncer service is running on every pgBouncer node
  # run_benchmarks_pgbouncer.yml never starts services — that is setup.yml's job.
  # If pgbouncer is not active on any proxy node, fail fast so the operator
  # knows to re-run: ansible-playbook setup.yml --tags pgbouncer
  hosts: pgbouncer
  gather_facts: false

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert pgbouncer.service is active
      ansible.builtin.assert:
        that:
          - "'pgbouncer.service' in ansible_facts.services"
          - ansible_facts.services['pgbouncer.service']['state'] == 'running'
        fail_msg: >-
          pgbouncer is not running on {{ inventory_hostname }}
          (state: {{ ansible_facts.services.get('pgbouncer.service', {}).get('state', 'not-installed') }})
          — re-run setup.yml --tags pgbouncer to install/start it.
        success_msg: "pgbouncer is running on {{ inventory_hostname }}"

- name: Pre-flight — verify HAProxy service is running on the haproxy node
  # If haproxy is not active on the haproxy node, fail fast so the operator
  # knows to re-run: ansible-playbook setup.yml --tags haproxy
  hosts: haproxy
  gather_facts: false

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert haproxy.service is active
      ansible.builtin.assert:
        that:
          - "'haproxy.service' in ansible_facts.services"
          - ansible_facts.services['haproxy.service']['state'] == 'running'
        fail_msg: >-
          haproxy is not running on {{ inventory_hostname }}
          (state: {{ ansible_facts.services.get('haproxy.service', {}).get('state', 'not-installed') }})
          — re-run setup.yml --tags haproxy to install/start it.
        success_msg: "haproxy is running on {{ inventory_hostname }}"

- name: Run pgBouncer benchmark from control node
  hosts: control
  gather_facts: false

  vars:
    run_name:   "{{ benchmark_profile_name | default('pgbouncer-prod') }}-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
    loadgen_hosts: "{{ groups['loadgen'] | default([]) }}"
    loadgen_count: "{{ loadgen_hosts | length }}"
    remote_bench_root: "/tmp/stressar-bench"
    remote_bench_home: "{{ remote_bench_root }}/stressar"
    remote_bench_binary: "{{ remote_bench_home }}/bin/bench"
    remote_run_root: "/tmp/stressar-runs/{{ run_name }}"
    remote_bench_config_file: "{{ remote_run_root }}/pgbouncer-benchmark.yaml"
    # Resolved from inventory 'db' group, or override via -e db_host=<IP>.
    db_host:    "{{ hostvars[groups['db'][0]]['ansible_host'] if 'db' in groups and groups['db'] | length > 0 else '' }}"
    # Traffic is sent through the HAProxy load balancer, which distributes across pgBouncer nodes.
    # The inventory must define a non-empty 'haproxy' group for SUT-C routing.
    lb_host: >-
      {{
        hostvars[groups['haproxy'][0]]['ansible_host']
        if 'haproxy' in groups and groups['haproxy'] | length > 0
        else ''
      }}
    bench_config_file: "/tmp/pgbouncer-benchmark-{{ run_name }}.yaml"
    # Remote path for pg side-car output file (written on the DB node)
    remote_pg_csv:   "/tmp/pg_metrics_{{ run_name }}.csv"
    # Remote paths for process metrics side-car CSVs
    remote_pgb_proc_csv:     "/tmp/pgbouncer_proc_metrics_{{ run_name }}.csv"
    remote_haproxy_proc_csv: "/tmp/haproxy_proc_metrics_{{ run_name }}.csv"
    remote_db_proc_csv:      "/tmp/db_proc_metrics_{{ run_name }}.csv"
    # Local (control-node) paths where side-car CSVs are fetched to
    local_pg_csv:         "{{ bench_results_dir }}/{{ run_name }}/node_metrics/pg_metrics.csv"
    local_proxy_csv_dir:  "{{ bench_results_dir }}/{{ run_name }}/node_metrics/proxy"
    local_lb_csv_dir:     "{{ bench_results_dir }}/{{ run_name }}/node_metrics/lb"
    local_db_csv_dir:     "{{ bench_results_dir }}/{{ run_name }}/node_metrics/db"
    # Paths to side-car scripts on the control node (copied to remote nodes)
    pg_script_src:         "{{ bench_repo_dir }}/ansible/scripts/collect_pg_metrics.sh"
    proc_script_src:       "{{ bench_repo_dir }}/ansible/scripts/collect_process_metrics.sh"
    remote_pg_script:          "/tmp/collect_pg_metrics.sh"
    remote_proc_script:        "/tmp/collect_process_metrics.sh"
    # PostgreSQL systemd service name — matches pg_service_name role default
    pg_service: "postgresql@{{ hostvars[groups['db'][0]]['pg_version'] | default(16) }}-main"

  tasks:
    # ── Freeze run_name so the timestamp is evaluated exactly once ────────────

    - name: Fix run name timestamp
      ansible.builtin.set_fact:
        run_name: "{{ run_name }}"

    # ── Preflight checks ──────────────────────────────────────────────────────

    - name: Assert required hosts are configured
      ansible.builtin.assert:
        that:
          - "'haproxy' in groups"
          - groups['haproxy'] | length > 0
          - lb_host | length > 0
          - db_host | length > 0
          - loadgen_count | int > 0
        fail_msg: >-
          Required host addresses are not configured.
          Missing required inventory group: 'haproxy' (must contain at least one host).
          The pgBouncer benchmark requires HAProxy -> pgBouncer -> DB routing.
          For db_host, add a 'db' group to your inventory, OR pass -e db_host=<IP> directly.
          For benchmark execution, define at least one host in the loadgen group.
          Check ansible/inventory.yml.example for the expected inventory structure.

    # ── Pre-run setup ─────────────────────────────────────────────────────────

    - name: Ensure results directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ bench_results_dir }}/{{ run_name }}"
        - "{{ bench_results_dir }}/{{ run_name }}/node_metrics"
        - "{{ local_proxy_csv_dir }}"
        - "{{ local_lb_csv_dir }}"
        - "{{ local_db_csv_dir }}"

    - name: Write run metadata
      ansible.builtin.copy:
        dest: "{{ bench_results_dir }}/{{ run_name }}/run_metadata.json"
        mode: "0644"
        content: |
          {
            "scenario": "{{ benchmark_profile_name | default('pgbouncer-prod') }}",
            "configured_db_connection_budget": {{ ((groups['pgbouncer'] | length) * (pgbouncer_pool_size | int)) | int }},
            "bench_replica_count": {{ bench_replica_count | int }},
            "pgbouncer_nodes": {{ groups['pgbouncer'] | length }},
            "pgbouncer_pool_size_per_node": {{ pgbouncer_pool_size | int }},
            "pgbouncer_reserve_pool_size": {{ pgbouncer_reserve_pool_size | int }},
            "pgbouncer_local_pool_size": {{ pgbouncer_local_pool_size | int }},
            "haproxy_nodes": {{ groups['haproxy'] | default([]) | length }},
            "external_lb": {{ ('haproxy' in groups and (groups['haproxy'] | length > 0)) | lower }}
          }

    - name: Render pgBouncer benchmark configuration
      ansible.builtin.template:
        src: "{{ bench_repo_dir }}/ansible/templates/pgbouncer-benchmark.yaml.j2"
        dest: "{{ bench_config_file }}"
        mode: "0644"

    - name: Show rendered config path
      ansible.builtin.debug:
        msg: "Benchmark config written to {{ bench_config_file }}"

    - name: Clean up previous run logs on loadgen hosts
      ansible.builtin.file:
        path: /tmp/stressar-runs
        state: absent
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"
      register: loadgen_cleanup_results
      failed_when: false

    - name: Report loadgen log cleanup delete failures
      ansible.builtin.debug:
        msg: >-
          WARN: Failed to delete /tmp/stressar-runs on {{ item.item }}; continuing.
          Details: {{ item.msg | default(item.stderr | default(item.exception | default('unknown error'))) }}
      loop: "{{ loadgen_cleanup_results.results | default([]) }}"
      when: item.failed | default(false)

    - name: Report loadgen log directory already absent
      ansible.builtin.debug:
        msg: "INFO: /tmp/stressar-runs not found on {{ item.item }}; continuing."
      loop: "{{ loadgen_cleanup_results.results | default([]) }}"
      when:
        - not (item.failed | default(false))
        - not (item.changed | default(false))

    - name: Clean up pgBouncer log on pgBouncer nodes
      become: true
      ansible.builtin.shell: |
        if [ -f "/var/log/pgbouncer/pgbouncer.log" ]; then
          truncate -s 0 "/var/log/pgbouncer/pgbouncer.log"
          echo "CLEARED"
        else
          echo "NOT_FOUND"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['pgbouncer'] }}"
      register: pgbouncer_log_cleanup_results
      failed_when: false

    - name: Report pgBouncer log cleanup failures
      ansible.builtin.debug:
        msg: >-
          WARN: Failed to clear /var/log/pgbouncer/pgbouncer.log on {{ item.item }}; continuing.
          Details: {{ item.stderr | default(item.msg | default('unknown error')) }}
      loop: "{{ pgbouncer_log_cleanup_results.results | default([]) }}"
      when: item.rc | default(0) != 0

    - name: Report pgBouncer log not found
      ansible.builtin.debug:
        msg: "INFO: /var/log/pgbouncer/pgbouncer.log not found on {{ item.item }}; continuing."
      loop: "{{ pgbouncer_log_cleanup_results.results | default([]) }}"
      when:
        - item.rc | default(0) == 0
        - "'NOT_FOUND' in (item.stdout | default(''))"

    - name: Clean up HAProxy log on HAProxy nodes
      become: true
      ansible.builtin.shell: |
        if [ -f "/var/log/haproxy.log" ]; then
          truncate -s 0 "/var/log/haproxy.log"
          echo "CLEARED"
        else
          echo "NOT_FOUND"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['haproxy'] }}"
      register: haproxy_log_cleanup_results
      failed_when: false

    - name: Report HAProxy log cleanup failures
      ansible.builtin.debug:
        msg: >-
          WARN: Failed to clear /var/log/haproxy.log on {{ item.item }}; continuing.
          Details: {{ item.stderr | default(item.msg | default('unknown error')) }}
      loop: "{{ haproxy_log_cleanup_results.results | default([]) }}"
      when: item.rc | default(0) != 0

    - name: Report HAProxy log not found
      ansible.builtin.debug:
        msg: "INFO: /var/log/haproxy.log not found on {{ item.item }}; continuing."
      loop: "{{ haproxy_log_cleanup_results.results | default([]) }}"
      when:
        - item.rc | default(0) == 0
        - "'NOT_FOUND' in (item.stdout | default(''))"

    - name: Clean up PostgreSQL log on DB node
      become: true
      ansible.builtin.shell: |
        pg_log_file="/var/log/postgresql/postgresql-{{ hostvars[groups['db'][0]]['pg_version'] | default(16) }}-main.log"
        if [ -f "${pg_log_file}" ]; then
          truncate -s 0 "${pg_log_file}"
          echo "CLEARED"
        else
          echo "NOT_FOUND"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['db'][0] }}"
      register: db_log_cleanup_result
      failed_when: false

    - name: Report PostgreSQL log cleanup failure
      ansible.builtin.debug:
        msg: >-
          WARN: Failed to clear PostgreSQL log on {{ groups['db'][0] }}; continuing.
          Details: {{ db_log_cleanup_result.stderr | default(db_log_cleanup_result.msg | default('unknown error')) }}
      when: db_log_cleanup_result.rc | default(0) != 0

    - name: Report PostgreSQL log not found
      ansible.builtin.debug:
        msg: "INFO: PostgreSQL log not found on {{ groups['db'][0] }}; continuing."
      when:
        - db_log_cleanup_result.rc | default(0) == 0
        - "'NOT_FOUND' in (db_log_cleanup_result.stdout | default(''))"

    - name: Ensure remote bench root exists on loadgen hosts
      ansible.builtin.file:
        path: "{{ remote_bench_root }}"
        state: directory
        mode: "0755"
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"

    - name: Ensure remote run root exists on loadgen hosts
      ansible.builtin.file:
        path: "{{ remote_run_root }}"
        state: directory
        mode: "0755"
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"

    - name: Copy bench distribution to loadgen hosts
      ansible.builtin.copy:
        src: "{{ bench_repo_dir }}/build/install/stressar/"
        dest: "{{ remote_bench_home }}/"
        mode: preserve
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"

    - name: Copy rendered benchmark configuration to loadgen hosts
      ansible.builtin.copy:
        src: "{{ bench_config_file }}"
        dest: "{{ remote_bench_config_file }}"
        mode: "0644"
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"

    # ── Reset PostgreSQL statistics (clean baseline) ──────────────────────────

    - name: Reset pg_stat_database counters
      become: true
      become_user: postgres
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        query: "SELECT pg_stat_reset();"
      delegate_to: "{{ groups['db'][0] }}"

    - name: Reset pg_stat_bgwriter counters
      become: true
      become_user: postgres
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        query: "SELECT pg_stat_reset_shared('bgwriter');"
      delegate_to: "{{ groups['db'][0] }}"

    # ── Deploy and start PostgreSQL metrics side-car on the DB node ───────────

    - name: Copy PostgreSQL metrics collection script to DB node
      ansible.builtin.copy:
        src: "{{ pg_script_src }}"
        dest: "{{ remote_pg_script }}"
        mode: "0755"
      delegate_to: "{{ groups['db'][0] }}"

    - name: Start PostgreSQL metrics collection on DB node
      ansible.builtin.shell: |
        nohup "{{ remote_pg_script }}" "{{ remote_pg_csv }}" \
          "{{ db_name }}" postgres \
          </dev/null >"{{ remote_pg_csv }}.log" 2>&1 &
        echo $! > "{{ remote_pg_csv }}.pid"
      args:
        executable: /bin/bash
      become: true
      become_user: postgres
      delegate_to: "{{ groups['db'][0] }}"
      changed_when: true

    # ── Deploy and start process metrics side-cars (CPU + RSS) ───────────────

    - name: Copy process metrics collection script to pgBouncer nodes
      ansible.builtin.copy:
        src: "{{ proc_script_src }}"
        dest: "{{ remote_proc_script }}"
        mode: "0755"
      delegate_to: "{{ item }}"
      loop: "{{ groups['pgbouncer'] }}"

    - name: Start process metrics collection on pgBouncer nodes (pgbouncer)
      ansible.builtin.shell: |
        nohup "{{ remote_proc_script }}" pgbouncer "{{ remote_pgb_proc_csv }}" \
          </dev/null >"{{ remote_pgb_proc_csv }}.log" 2>&1 &
        echo $! > "{{ remote_pgb_proc_csv }}.pid"
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['pgbouncer'] }}"
      changed_when: true

    - name: Copy process metrics collection script to haproxy node
      ansible.builtin.copy:
        src: "{{ proc_script_src }}"
        dest: "{{ remote_proc_script }}"
        mode: "0755"
      delegate_to: "{{ groups['haproxy'][0] }}"
      when: "'haproxy' in groups and groups['haproxy'] | length > 0"

    - name: Start process metrics collection on haproxy node (haproxy)
      ansible.builtin.shell: |
        nohup "{{ remote_proc_script }}" haproxy "{{ remote_haproxy_proc_csv }}" \
          </dev/null >"{{ remote_haproxy_proc_csv }}.log" 2>&1 &
        echo $! > "{{ remote_haproxy_proc_csv }}.pid"
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['haproxy'][0] }}"
      when: "'haproxy' in groups and groups['haproxy'] | length > 0"
      changed_when: true

    - name: Copy process metrics collection script to DB node
      ansible.builtin.copy:
        src: "{{ proc_script_src }}"
        dest: "{{ remote_proc_script }}"
        mode: "0755"
      delegate_to: "{{ groups['db'][0] }}"

    - name: Start process metrics collection on DB node (PostgreSQL)
      ansible.builtin.shell: |
        nohup "{{ remote_proc_script }}" "{{ pg_service }}" "{{ remote_db_proc_csv }}" \
          </dev/null >"{{ remote_db_proc_csv }}.log" 2>&1 &
        echo $! > "{{ remote_db_proc_csv }}.pid"
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['db'][0] }}"
      changed_when: true


    # ── Warmup ───────────────────────────────────────────────────────────────

    - name: Run warmup pass on first loadgen host
      ansible.builtin.shell: >
        "{{ remote_bench_binary }}" warmup --config "{{ remote_bench_config_file }}"
        >"{{ remote_run_root }}/warmup.log" 2>&1
      args:
        executable: /bin/bash
      register: warmup_out
      changed_when: true
      delegate_to: "{{ loadgen_hosts[0] }}"

    - name: Print warmup output
      ansible.builtin.debug:
        msg: "Warmup log written to {{ remote_run_root }}/warmup.log on {{ loadgen_hosts[0] }}"

    # ── Parallel benchmark replicas ──────────────────────────────────────────

    - name: Launch benchmark replicas on loadgen hosts
      ansible.builtin.shell: >
        mkdir -p "{{ remote_run_root }}/replica-{{ item }}" &&
        "{{ remote_bench_binary }}" run
        --config "{{ remote_bench_config_file }}"
        --output "{{ remote_run_root }}/replica-{{ item }}/"
        --instance-id {{ item }}
        >"{{ remote_run_root }}/replica-{{ item }}/application.log" 2>&1
      args:
        executable: /bin/bash
      async: 10800
      poll: 0
      register: bench_jobs
      changed_when: true
      delegate_to: "{{ loadgen_hosts[item | int % loadgen_count | int] }}"
      loop: "{{ range(0, bench_replica_count | int) | list }}"

    - name: Wait for all benchmark replicas
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      register: bench_job_status
      until: bench_job_status.finished
      retries: 2160
      delay: 5
      loop: "{{ bench_jobs.results }}"
      loop_control:
        label: "replica-{{ item.item }}"
      delegate_to: "{{ loadgen_hosts[item.item | int % loadgen_count | int] }}"
      changed_when: false

    - name: Print bench run output
      ansible.builtin.debug:
        msg: "All {{ bench_replica_count }} replicas finished on loadgen hosts."

    - name: Read replica summary.json from loadgen hosts
      ansible.builtin.command: >
        cat {{ remote_run_root }}/replica-{{ item }}/summary.json
      register: remote_summaries
      changed_when: false
      delegate_to: "{{ loadgen_hosts[item | int % loadgen_count | int] }}"
      loop: "{{ range(0, bench_replica_count | int) | list }}"

    - name: Ensure local replica summary directories exist
      ansible.builtin.file:
        path: "{{ bench_results_dir }}/{{ run_name }}/replica-{{ item }}"
        state: directory
        mode: "0755"
      loop: "{{ range(0, bench_replica_count | int) | list }}"

    - name: Write replica summary.json to control-node results directory
      ansible.builtin.copy:
        content: "{{ item.stdout }}"
        dest: "{{ bench_results_dir }}/{{ run_name }}/replica-{{ item.item }}/summary.json"
        mode: "0644"
      loop: "{{ remote_summaries.results }}"

    # ── Stop PostgreSQL metrics side-car; fetch CSV ───────────────────────────

    - name: Stop PostgreSQL metrics collection on DB node
      ansible.builtin.shell: |
        PID_FILE="{{ remote_pg_csv }}.pid"
        if [ -f "${PID_FILE}" ]; then
          kill "$(cat "${PID_FILE}")" 2>/dev/null || true
          rm -f "${PID_FILE}"
        fi
      args:
        executable: /bin/bash
      become: true
      become_user: postgres
      delegate_to: "{{ groups['db'][0] }}"
      changed_when: true
      ignore_errors: true

    - name: Fetch PostgreSQL metrics CSV from DB node
      ansible.builtin.fetch:
        src: "{{ remote_pg_csv }}"
        dest: "{{ local_pg_csv }}"
        flat: true
        fail_on_missing: false
        validate_checksum: false
      delegate_to: "{{ groups['db'][0] }}"

    # ── Stop process metrics side-cars; fetch CSVs ────────────────────────────

    - name: Stop process metrics collection on pgBouncer nodes
      ansible.builtin.shell: |
        PID_FILE="{{ remote_pgb_proc_csv }}.pid"
        if [ -f "${PID_FILE}" ]; then
          kill "$(cat "${PID_FILE}")" 2>/dev/null || true
          rm -f "${PID_FILE}"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['pgbouncer'] }}"
      changed_when: true
      ignore_errors: true

    - name: Fetch pgBouncer process metrics CSV from each pgBouncer node
      ansible.builtin.fetch:
        src: "{{ remote_pgb_proc_csv }}"
        dest: "{{ local_proxy_csv_dir }}/{{ item }}_proc_metrics.csv"
        flat: true
        fail_on_missing: false
        validate_checksum: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['pgbouncer'] }}"

    - name: Stop process metrics collection on haproxy node
      ansible.builtin.shell: |
        PID_FILE="{{ remote_haproxy_proc_csv }}.pid"
        if [ -f "${PID_FILE}" ]; then
          kill "$(cat "${PID_FILE}")" 2>/dev/null || true
          rm -f "${PID_FILE}"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['haproxy'][0] }}"
      when: "'haproxy' in groups and groups['haproxy'] | length > 0"
      changed_when: true
      ignore_errors: true

    - name: Fetch HAProxy process metrics CSV from haproxy node
      ansible.builtin.fetch:
        src: "{{ remote_haproxy_proc_csv }}"
        dest: "{{ local_lb_csv_dir }}/lb_proc_metrics.csv"
        flat: true
        fail_on_missing: false
        validate_checksum: false
      delegate_to: "{{ groups['haproxy'][0] }}"
      when: "'haproxy' in groups and groups['haproxy'] | length > 0"

    - name: Stop process metrics collection on DB node
      ansible.builtin.shell: |
        PID_FILE="{{ remote_db_proc_csv }}.pid"
        if [ -f "${PID_FILE}" ]; then
          kill "$(cat "${PID_FILE}")" 2>/dev/null || true
          rm -f "${PID_FILE}"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['db'][0] }}"
      changed_when: true
      ignore_errors: true

    - name: Fetch DB process metrics CSV from DB node
      ansible.builtin.fetch:
        src: "{{ remote_db_proc_csv }}"
        dest: "{{ local_db_csv_dir }}/db_proc_metrics.csv"
        flat: true
        fail_on_missing: false
        validate_checksum: false
      delegate_to: "{{ groups['db'][0] }}"


    # ── Report ────────────────────────────────────────────────────────────────

    - name: Generate Markdown report
      ansible.builtin.command: >
        {{ bench_repo_dir }}/ansible/scripts/generate_report.sh
          "{{ bench_results_dir }}/{{ run_name }}"
          "{{ bench_results_dir }}/{{ run_name }}/report.md"
          "{{ bench_slo_p95_ms | default(50) }}"
      register: report_out
      changed_when: true

    - name: Print report location
      ansible.builtin.debug:
        msg: "Report written to {{ bench_results_dir }}/{{ run_name }}/report.md"

    - name: Print report summary
      ansible.builtin.command: >
        cat "{{ bench_results_dir }}/{{ run_name }}/report.md"
      register: report_content
      changed_when: false

    - name: Show report
      ansible.builtin.debug:
        msg: "{{ report_content.stdout_lines }}"
