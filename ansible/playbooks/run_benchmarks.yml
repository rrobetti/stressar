---
# ansible/playbooks/run_benchmarks.yml
#
# Executes the full benchmark suite from the control node:
#   1. Renders a bench config from the Jinja2 template.
#   2. Resets PostgreSQL statistics so the run starts from a clean baseline.
#   3. Deploys and starts side-car metric collectors on OJP proxy + DB nodes.
#   4. Pre-flight: verifies the ojp-server systemd service is active on every
#      proxy node and fails fast if any are down — re-run setup.yml --tags ojp
#      to bring them up.
#   5. Runs a warmup pass (single instance).
#   6. Launches {{ bench_replica_count }} bench JVMs in parallel.
#   7. Waits for all replicas to finish.
#   8. Stops side-car collectors and fetches their CSV files to the control node.
#   9. Runs generate_report.sh to produce a Markdown report.
#
# Side-car scripts:
#   ansible/scripts/collect_jvm_metrics.sh     — runs on each proxy node via jstat;
#       captures actual JVM heap (not OS RSS) + GC stats once per second.
#   ansible/scripts/collect_pg_metrics.sh      — runs on the DB node; polls
#       pg_stat_database, pg_stat_bgwriter, and pg_locks every 5 seconds.
#   ansible/scripts/collect_process_metrics.sh — runs on each proxy node and on the
#       DB node; captures OS-level CPU% and RSS/VSZ for ojp-server and PostgreSQL.
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/run_benchmarks.yml \
#     -e @ansible/vars/dryrun-ojp.yml
#
# Optional overrides:
#   -e run_name=ojp-run-1          # subdirectory under results/
#   -e bench_target_rps=500
#   -e bench_duration_seconds=300
#   -e bench_replica_count=4

- name: Pre-flight — verify OJP service is running on every OJP node
  # run_benchmarks.yml never starts services — that is setup.yml's job.
  # If ojp-server is not active on any proxy node, fail fast so the operator
  # knows to re-run: ansible-playbook setup.yml --tags ojp
  hosts: ojp
  gather_facts: false

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert ojp-server.service is active
      ansible.builtin.assert:
        that:
          - "'ojp-server.service' in ansible_facts.services"
          - ansible_facts.services['ojp-server.service']['state'] == 'running'
        fail_msg: >-
          ojp-server is not running on {{ inventory_hostname }}
          (state: {{ ansible_facts.services.get('ojp-server.service', {}).get('state', 'not-installed') }})
          — re-run setup.yml --tags ojp to install/start it.
        success_msg: "ojp-server is running on {{ inventory_hostname }}"

- name: Run benchmark from control node
  hosts: control
  gather_facts: false

  vars:
    run_name:   "{{ benchmark_profile_name | default('ojp-prod') }}-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
    db_host:    "{{ hostvars[groups['db'][0]]['ansible_host'] }}"
    # Build the list of OJP_IP:PORT strings from the ojp inventory group.
    proxy_urls: >-
      {{
        groups['ojp']
          | map('extract', hostvars, 'ansible_host')
          | map('regex_replace', '$', ':' + (ojp_server_port | string))
          | list
      }}
    loadgen_hosts: "{{ groups['loadgen'] | default([]) }}"
    loadgen_count: "{{ loadgen_hosts | length }}"
    remote_bench_root: "/tmp/stressar-bench"
    remote_bench_home: "{{ remote_bench_root }}/ojp-performance-tester"
    remote_bench_binary: "{{ remote_bench_home }}/bin/bench"
    remote_run_root: "/tmp/stressar-runs/{{ run_name }}"
    remote_bench_config_file: "{{ remote_run_root }}/ojp-benchmark.yaml"
    bench_config_file: "/tmp/ojp-benchmark-{{ run_name }}.yaml"
    # Remote paths for side-car output files (written on each remote node)
    remote_jvm_csv:  "/tmp/jvm_metrics_{{ run_name }}.csv"
    remote_pg_csv:   "/tmp/pg_metrics_{{ run_name }}.csv"
    # Remote paths for process metrics side-car CSVs
    remote_ojp_proc_csv: "/tmp/ojp_proc_metrics_{{ run_name }}.csv"
    remote_db_proc_csv:  "/tmp/db_proc_metrics_{{ run_name }}.csv"
    # Local (control-node) paths where side-car CSVs are fetched to
    local_jvm_csv_dir:    "{{ bench_results_dir }}/{{ run_name }}/node_metrics/proxy"
    local_pg_csv:         "{{ bench_results_dir }}/{{ run_name }}/node_metrics/pg_metrics.csv"
    local_db_metrics_dir: "{{ bench_results_dir }}/{{ run_name }}/node_metrics/db"
    # Paths to side-car scripts on the control node (copied to remote nodes)
    jvm_script_src:  "{{ bench_repo_dir }}/ansible/scripts/collect_jvm_metrics.sh"
    pg_script_src:   "{{ bench_repo_dir }}/ansible/scripts/collect_pg_metrics.sh"
    proc_script_src: "{{ bench_repo_dir }}/ansible/scripts/collect_process_metrics.sh"
    remote_jvm_script:  "/tmp/collect_jvm_metrics.sh"
    remote_pg_script:   "/tmp/collect_pg_metrics.sh"
    remote_proc_script: "/tmp/collect_process_metrics.sh"
    # PostgreSQL systemd service name — matches pg_service_name role default
    pg_service: "postgresql@{{ hostvars[groups['db'][0]]['pg_version'] | default(16) }}-main"

  tasks:
    # ── Freeze run_name so the timestamp is evaluated exactly once ────────────

    - name: Fix run name timestamp
      ansible.builtin.set_fact:
        run_name: "{{ run_name }}"

    # ── Pre-run setup ─────────────────────────────────────────────────────────

    - name: Ensure results directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ bench_results_dir }}/{{ run_name }}"
        - "{{ local_jvm_csv_dir }}"
        - "{{ local_db_metrics_dir }}"

    - name: Write run metadata
      ansible.builtin.copy:
        dest: "{{ bench_results_dir }}/{{ run_name }}/run_metadata.json"
        mode: "0644"
        content: |
          {
            "scenario": "{{ benchmark_profile_name | default('ojp-prod') }}",
            "configured_db_connection_budget": {{ bench_db_connection_budget | int }},
            "bench_replica_count": {{ bench_replica_count | int }},
            "ojp_servers": {{ groups['ojp'] | length }},
            "real_db_connections_per_ojp_server": {{ (bench_db_connection_budget | int // (groups['ojp'] | length if (groups['ojp'] | length) > 0 else 1)) | int }},
            "external_lb": false
          }

    - name: Assert loadgen inventory is defined
      ansible.builtin.assert:
        that:
          - loadgen_count | int > 0
        fail_msg: "At least one host must be present in the loadgen group."

    - name: Render benchmark configuration
      ansible.builtin.template:
        src: "{{ bench_repo_dir }}/ansible/templates/ojp-benchmark.yaml.j2"
        dest: "{{ bench_config_file }}"
        mode: "0644"

    - name: Show rendered config path
      ansible.builtin.debug:
        msg: "Benchmark config written to {{ bench_config_file }}"

    - name: Ensure remote bench root exists on loadgen hosts
      ansible.builtin.file:
        path: "{{ remote_bench_root }}"
        state: directory
        mode: "0755"
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"

    - name: Ensure remote run root exists on loadgen hosts
      ansible.builtin.file:
        path: "{{ remote_run_root }}"
        state: directory
        mode: "0755"
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"

    - name: Copy bench distribution to loadgen hosts
      ansible.builtin.copy:
        src: "{{ bench_repo_dir }}/build/install/ojp-performance-tester/"
        dest: "{{ remote_bench_home }}/"
        mode: preserve
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"

    - name: Copy rendered benchmark configuration to loadgen hosts
      ansible.builtin.copy:
        src: "{{ bench_config_file }}"
        dest: "{{ remote_bench_config_file }}"
        mode: "0644"
      delegate_to: "{{ item }}"
      loop: "{{ loadgen_hosts }}"

    # ── Reset PostgreSQL statistics (clean baseline) ──────────────────────────

    - name: Reset pg_stat_database counters
      become: true
      become_user: postgres
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        query: "SELECT pg_stat_reset();"
      delegate_to: "{{ groups['db'][0] }}"

    - name: Reset pg_stat_bgwriter counters
      become: true
      become_user: postgres
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        query: "SELECT pg_stat_reset_shared('bgwriter');"
      delegate_to: "{{ groups['db'][0] }}"

    # ── Deploy and start OJP JVM metrics side-car on each proxy node ──────────

    - name: Copy JVM metrics collection script to OJP nodes
      ansible.builtin.copy:
        src: "{{ jvm_script_src }}"
        dest: "{{ remote_jvm_script }}"
        mode: "0755"
      delegate_to: "{{ item }}"
      loop: "{{ groups['ojp'] }}"

    - name: Start JVM metrics collection on OJP nodes
      ansible.builtin.shell: |
        nohup "{{ remote_jvm_script }}" "{{ remote_jvm_csv }}" \
          </dev/null >"{{ remote_jvm_csv }}.log" 2>&1 &
        echo $! > "{{ remote_jvm_csv }}.pid"
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['ojp'] }}"
      changed_when: true

    # ── Deploy and start PostgreSQL metrics side-car on the DB node ───────────

    - name: Copy PostgreSQL metrics collection script to DB node
      ansible.builtin.copy:
        src: "{{ pg_script_src }}"
        dest: "{{ remote_pg_script }}"
        mode: "0755"
      delegate_to: "{{ groups['db'][0] }}"

    - name: Start PostgreSQL metrics collection on DB node
      ansible.builtin.shell: |
        nohup "{{ remote_pg_script }}" "{{ remote_pg_csv }}" \
          "{{ db_name }}" postgres \
          </dev/null >"{{ remote_pg_csv }}.log" 2>&1 &
        echo $! > "{{ remote_pg_csv }}.pid"
      args:
        executable: /bin/bash
      become: true
      become_user: postgres
      delegate_to: "{{ groups['db'][0] }}"
      changed_when: true

    # ── Deploy and start process metrics side-cars (CPU + RSS) ───────────────

    - name: Copy process metrics collection script to proxy nodes
      ansible.builtin.copy:
        src: "{{ proc_script_src }}"
        dest: "{{ remote_proc_script }}"
        mode: "0755"
      delegate_to: "{{ item }}"
      loop: "{{ groups['ojp'] }}"

    - name: Start process metrics collection on proxy nodes (ojp-server)
      ansible.builtin.shell: |
        nohup "{{ remote_proc_script }}" ojp-server "{{ remote_ojp_proc_csv }}" \
          </dev/null >"{{ remote_ojp_proc_csv }}.log" 2>&1 &
        echo $! > "{{ remote_ojp_proc_csv }}.pid"
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['ojp'] }}"
      changed_when: true

    - name: Copy process metrics collection script to DB node
      ansible.builtin.copy:
        src: "{{ proc_script_src }}"
        dest: "{{ remote_proc_script }}"
        mode: "0755"
      delegate_to: "{{ groups['db'][0] }}"

    - name: Start process metrics collection on DB node (PostgreSQL)
      ansible.builtin.shell: |
        nohup "{{ remote_proc_script }}" "{{ pg_service }}" "{{ remote_db_proc_csv }}" \
          </dev/null >"{{ remote_db_proc_csv }}.log" 2>&1 &
        echo $! > "{{ remote_db_proc_csv }}.pid"
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['db'][0] }}"
      changed_when: true

    # ── Warmup ───────────────────────────────────────────────────────────────

    - name: Run warmup pass on first loadgen host
      ansible.builtin.command: >
        {{ remote_bench_binary }} warmup --config {{ remote_bench_config_file }}
      register: warmup_out
      changed_when: true
      delegate_to: "{{ loadgen_hosts[0] }}"

    - name: Print warmup output
      ansible.builtin.debug:
        msg: "{{ warmup_out.stdout_lines[-10:] }}"

    # ── Parallel benchmark replicas ──────────────────────────────────────────

    - name: Launch benchmark replicas on loadgen hosts
      ansible.builtin.command: >
        {{ remote_bench_binary }} run
        --config {{ remote_bench_config_file }}
        --output {{ remote_run_root }}/replica-{{ item }}/
        --instance-id {{ item }}
      async: 10800
      poll: 0
      register: bench_jobs
      changed_when: true
      delegate_to: "{{ loadgen_hosts[item | int % loadgen_count | int] }}"
      loop: "{{ range(0, bench_replica_count | int) | list }}"

    - name: Wait for all benchmark replicas
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      register: bench_job_status
      until: bench_job_status.finished
      retries: 2160
      delay: 5
      loop: "{{ bench_jobs.results }}"
      loop_control:
        label: "replica-{{ item.item }}"
      delegate_to: "{{ loadgen_hosts[item.item | int % loadgen_count | int] }}"
      changed_when: false

    - name: Print bench run output
      ansible.builtin.debug:
        msg: "All {{ bench_replica_count }} replicas finished on loadgen hosts."

    - name: Read replica summary.json from loadgen hosts
      ansible.builtin.command: >
        cat {{ remote_run_root }}/replica-{{ item }}/summary.json
      register: remote_summaries
      changed_when: false
      delegate_to: "{{ loadgen_hosts[item | int % loadgen_count | int] }}"
      loop: "{{ range(0, bench_replica_count | int) | list }}"

    - name: Ensure local replica summary directories exist
      ansible.builtin.file:
        path: "{{ bench_results_dir }}/{{ run_name }}/replica-{{ item }}"
        state: directory
        mode: "0755"
      loop: "{{ range(0, bench_replica_count | int) | list }}"

    - name: Write replica summary.json to control-node results directory
      ansible.builtin.copy:
        content: "{{ item.stdout }}"
        dest: "{{ bench_results_dir }}/{{ run_name }}/replica-{{ item.item }}/summary.json"
        mode: "0644"
      loop: "{{ remote_summaries.results }}"

    # ── Stop OJP JVM metrics side-car on proxy nodes; fetch CSVs ─────────────

    - name: Stop JVM metrics collection on OJP nodes
      ansible.builtin.shell: |
        PID_FILE="{{ remote_jvm_csv }}.pid"
        if [ -f "${PID_FILE}" ]; then
          kill "$(cat "${PID_FILE}")" 2>/dev/null || true
          rm -f "${PID_FILE}"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['ojp'] }}"
      changed_when: true
      ignore_errors: true

    - name: Fetch JVM metrics CSV from each OJP node
      ansible.builtin.fetch:
        src: "{{ remote_jvm_csv }}"
        dest: "{{ local_jvm_csv_dir }}/{{ item }}_jvm_metrics.csv"
        flat: true
        fail_on_missing: false
        validate_checksum: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['ojp'] }}"

    # ── Stop PostgreSQL metrics side-car; fetch CSV ───────────────────────────

    - name: Stop PostgreSQL metrics collection on DB node
      ansible.builtin.shell: |
        PID_FILE="{{ remote_pg_csv }}.pid"
        if [ -f "${PID_FILE}" ]; then
          kill "$(cat "${PID_FILE}")" 2>/dev/null || true
          rm -f "${PID_FILE}"
        fi
      args:
        executable: /bin/bash
      become: true
      become_user: postgres
      delegate_to: "{{ groups['db'][0] }}"
      changed_when: true
      ignore_errors: true

    - name: Fetch PostgreSQL metrics CSV from DB node
      ansible.builtin.fetch:
        src: "{{ remote_pg_csv }}"
        dest: "{{ local_pg_csv }}"
        flat: true
        fail_on_missing: false
        validate_checksum: false
      delegate_to: "{{ groups['db'][0] }}"

    # ── Stop process metrics side-cars; fetch CSVs ────────────────────────────

    - name: Stop process metrics collection on OJP nodes
      ansible.builtin.shell: |
        PID_FILE="{{ remote_ojp_proc_csv }}.pid"
        if [ -f "${PID_FILE}" ]; then
          kill "$(cat "${PID_FILE}")" 2>/dev/null || true
          rm -f "${PID_FILE}"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['ojp'] }}"
      changed_when: true
      ignore_errors: true

    - name: Fetch OJP process metrics CSV from each OJP node
      ansible.builtin.fetch:
        src: "{{ remote_ojp_proc_csv }}"
        dest: "{{ local_jvm_csv_dir }}/{{ item }}_proc_metrics.csv"
        flat: true
        fail_on_missing: false
        validate_checksum: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['ojp'] }}"

    - name: Stop process metrics collection on DB node
      ansible.builtin.shell: |
        PID_FILE="{{ remote_db_proc_csv }}.pid"
        if [ -f "${PID_FILE}" ]; then
          kill "$(cat "${PID_FILE}")" 2>/dev/null || true
          rm -f "${PID_FILE}"
        fi
      args:
        executable: /bin/bash
      delegate_to: "{{ groups['db'][0] }}"
      changed_when: true
      ignore_errors: true

    - name: Fetch DB process metrics CSV from DB node
      ansible.builtin.fetch:
        src: "{{ remote_db_proc_csv }}"
        dest: "{{ local_db_metrics_dir }}/db_proc_metrics.csv"
        flat: true
        fail_on_missing: false
        validate_checksum: false
      delegate_to: "{{ groups['db'][0] }}"

    # ── Report ────────────────────────────────────────────────────────────────

    - name: Generate Markdown report
      ansible.builtin.command: >
        {{ bench_repo_dir }}/ansible/scripts/generate_report.sh
          "{{ bench_results_dir }}/{{ run_name }}"
          "{{ bench_results_dir }}/{{ run_name }}/report.md"
          "{{ bench_slo_p95_ms | default(50) }}"
      register: report_out
      changed_when: true

    - name: Print report location
      ansible.builtin.debug:
        msg: "Report written to {{ bench_results_dir }}/{{ run_name }}/report.md"

    - name: Print report summary
      ansible.builtin.command: >
        cat "{{ bench_results_dir }}/{{ run_name }}/report.md"
      register: report_content
      changed_when: false

    - name: Show report
      ansible.builtin.debug:
        msg: "{{ report_content.stdout_lines }}"
