---
# ansible/tasks/write_node_inventory.yml
#
# Reusable task file: build and persist node_inventory.json.
#
# Requires:
#   - A preceding `hosts: all, gather_facts: true` play so that
#     hostvars is populated for every inventory host.
#   - The variable `bench_results_dir` and `run_name` to be set
#     in the calling play's scope (both are standard run_benchmarks vars).
#
# Produces:
#   {{ bench_results_dir }}/{{ run_name }}/node_inventory.json
#
# Include with:
#   ansible.builtin.include_tasks:
#     file: "{{ bench_repo_dir }}/ansible/tasks/write_node_inventory.yml"

- name: Initialize node inventory list
  ansible.builtin.set_fact:
    _node_inventory_hosts: []

- name: Build node inventory from gathered facts
  # ansible_processor is a flat list structured as repeating triples per socket:
  #   [socket_index, vendor_id, model_name, ...]
  # e.g. ["0", "GenuineIntel", "Intel(R) Xeon(R) ..."]
  # We extract the CPU model by filtering out pure-numeric socket indices and
  # known vendor ID strings, then taking the first unique remaining value.
  # Known vendor IDs: GenuineIntel, AuthenticAMD, ARM, CentaurHauls, HygonGenuine.
  # Extend the reject list below if other platforms are added to your inventory.
  ansible.builtin.set_fact:
    _node_inventory_hosts: >-
      {{ _node_inventory_hosts + [{
        'inventory_hostname': item,
        'ansible_host': hostvars[item].ansible_host | default(item),
        'roles': groups | dict2items
                 | selectattr('value', 'contains', item)
                 | map(attribute='key')
                 | reject('equalto', 'all')
                 | reject('equalto', 'proxy')
                 | reject('equalto', 'lb')
                 | list,
        'os_name':             hostvars[item].ansible_distribution         | default('N/A'),
        'os_version':          hostvars[item].ansible_distribution_version  | default('N/A'),
        'os_release':          hostvars[item].ansible_distribution_release  | default('N/A'),
        'kernel':              hostvars[item].ansible_kernel                | default('N/A'),
        'architecture':        hostvars[item].ansible_machine               | default('N/A'),
        'cpu_model': >-
          {%- set _cpu_candidates = hostvars[item].ansible_processor | default([])
               | reject('match', '^[0-9]+$')
               | reject('equalto', 'GenuineIntel')
               | reject('equalto', 'AuthenticAMD')
               | reject('equalto', 'ARM')
               | reject('equalto', 'CentaurHauls')
               | reject('equalto', 'HygonGenuine')
               | list | unique -%}
          {{ _cpu_candidates[0] | default('N/A') }},
        'cpu_sockets':         hostvars[item].ansible_processor_count       | default(none),
        'cpu_cores_per_socket': hostvars[item].ansible_processor_cores      | default(none),
        'cpu_threads_per_core': hostvars[item].ansible_processor_threads_per_core | default(none),
        'cpu_vcpus':           hostvars[item].ansible_processor_vcpus       | default(none),
        'total_memory_mb':     hostvars[item].ansible_memtotal_mb           | default(none)
      }] }}
  loop: "{{ groups['all'] }}"
  when: hostvars[item].ansible_distribution is defined

- name: Write node inventory JSON
  ansible.builtin.copy:
    dest: "{{ bench_results_dir }}/{{ run_name }}/node_inventory.json"
    mode: "0644"
    content: "{{ {'collected_at': lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ'), 'hosts': _node_inventory_hosts} | to_nice_json }}\n"
