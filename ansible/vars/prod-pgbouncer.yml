# ansible/vars/prod-pgbouncer.yml
#
# Full-hardware production profile for pgBouncer (SUT-C).

# Benchmark run profile
bench_replica_count:     16
bench_target_rps:        500
bench_warmup_seconds:    60
bench_duration_seconds:  300
bench_cooldown_seconds:  30
bench_slo_p95_ms:        50

# pgBouncer server-side pooling profile
# 16 per proxy node × 3 proxy nodes = 48 backend connections total.
pgbouncer_pool_size:     16
pgbouncer_min_pool_size: 16

# Production-like bench local client-side pool against pgBouncer endpoint.
# This is intentionally higher than the benchmark/fair-comparison default (2).
pgbouncer_local_pool_size: 20
