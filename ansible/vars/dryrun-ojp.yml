---
# ansible/vars/dryrun-ojp.yml
#
# Minimal-hardware overrides for an OJP (SUT-B) dry run.
# Dry-run inventories should keep the full logical group structure
# (control/loadgen/db/ojp/pgbouncer/haproxy), but this OJP profile actively
# uses control/loadgen/db/ojp only.
# OJP dry-run keeps the architecture: no local client-side Hikari pool, with
# real PostgreSQL connections pooled in the OJP server tier.
# Expected run time: ≈ 5 minutes (seed + warmup + 60 s bench + report).
#
# Setup (OJP only — skips pgBouncer and HAProxy):
#   ansible-playbook -i ansible/inventory.yml ansible/playbooks/setup.yml \
#     --tags db,ojp,bench,init-db  -e @ansible/vars/dryrun-ojp.yml
#
# Run:
#   ansible-playbook -i ansible/inventory.yml ansible/playbooks/run_benchmarks.yml \
#     -e @ansible/vars/dryrun-ojp.yml

# ── Dataset (fast to seed) ────────────────────────────────────────────────────
bench_num_accounts: 10000
bench_num_items:    1000
bench_num_orders:   100000

# ── Benchmark run ─────────────────────────────────────────────────────────────
benchmark_profile_name: "ojp-dryrun"
bench_replica_count:     2
# Dry-runs use 50 RPS to create measurable queue/latency pressure.
# At 25 RPS this profile was too comfortable and did not stress the system.
bench_target_rps:        50
bench_warmup_seconds:    10
bench_duration_seconds:  60
bench_cooldown_seconds:  10
bench_slo_p95_ms:        50

# ── OJP centralized backend budget (small dry-run) ───────────────────────────
# Logical topology target: 3 OJP servers × 2 real PostgreSQL connections = 6.
bench_db_connection_budget: 6

# ── PostgreSQL — tuned for 1 vCPU / 1 GB RAM ─────────────────────────────────
# shared_buffers  ≈ 128 MB (25 % of ~512 MB usable after OS overhead)
# effective_cache ≈ 384 MB (remaining page-cache budget)
pg_shared_buffers:               "128MB"
pg_effective_cache_size:         "384MB"
pg_maintenance_work_mem:         "32MB"
pg_work_mem:                     "4MB"
pg_wal_buffers:                  "4MB"
pg_min_wal_size:                 "80MB"
pg_max_wal_size:                 "256MB"
pg_max_connections:              50
pg_max_worker_processes:         1
pg_max_parallel_workers_per_gather: 1
pg_max_parallel_workers:         1
pg_effective_io_concurrency:     1
pg_random_page_cost:             "4.0"
