# ansible/vars/prod-hikari.yml
#
# Full-hardware production profile for HikariCP Direct (SUT-A).

# Benchmark run profile
bench_replica_count:     16
bench_target_rps:        500
bench_warmup_seconds:    60
bench_duration_seconds:  300
bench_cooldown_seconds:  30
bench_slo_p95_ms:        50

# Hikari disciplined pooling profile
# Ceiling allocation in code gives ceil(300 / 16) = 19 per replica.
bench_db_connection_budget:             300
bench_hikari_max_pool_size_per_replica: 19
