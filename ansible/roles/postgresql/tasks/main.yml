---
# ansible/roles/postgresql/tasks/main.yml
# Installs and configures PostgreSQL {{ pg_version }} for OJP benchmarking.

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present
    update_cache: true
  become: true

- name: Create PGDG keyring directory
  ansible.builtin.file:
    path: /usr/share/postgresql-common/pgdg
    state: directory
    mode: "0755"
  become: true

- name: Download PGDG signing key
  ansible.builtin.command:
    argv:
      - curl
      - -fsSL
      - -o
      - /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
      - https://www.postgresql.org/media/keys/ACCC4CF8.asc
    creates: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
  become: true
  changed_when: true

- name: Add PGDG apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc]
      https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main
    filename: pgdg
    state: present
  become: true

- name: Install PostgreSQL {{ pg_version }}
  ansible.builtin.apt:
    name:
      - "postgresql-{{ pg_version }}"
      - "postgresql-{{ pg_version }}-contrib"
      - "postgresql-client-{{ pg_version }}"
    state: present
    update_cache: true
  become: true

- name: Start and enable PostgreSQL service
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true
  become: true

- name: Deploy postgresql.conf tuning
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0644"
  become: true
  notify: restart postgresql

- name: Deploy pg_hba.conf (allow benchuser from any host)
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  become: true
  notify: reload postgresql

- name: Ensure PostgreSQL is listening on all interfaces
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses\\s*="
    line: "listen_addresses = '*'"
  become: true
  notify: restart postgresql

- name: Flush handlers to apply configuration before creating DB objects
  ansible.builtin.meta: flush_handlers

- name: Create benchmark database
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    state: present

- name: Create benchmark user
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    db: "{{ db_name }}"
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "ALL"
    state: present

- name: Grant public schema privileges to benchmark user
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    db: "{{ db_name }}"
    privs: ALL
    type: schema
    objs: public
    role: "{{ db_user }}"
    state: present
