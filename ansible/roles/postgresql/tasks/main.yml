---
# ansible/roles/postgresql/tasks/main.yml
# Installs and configures PostgreSQL {{ pg_version }} for benchmarking.

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - ssl-cert
    state: present
    update_cache: true
  become: true

- name: Create PGDG keyring directory
  ansible.builtin.file:
    path: /usr/share/postgresql-common/pgdg
    state: directory
    mode: "0755"
  become: true

- name: Download PGDG signing key
  ansible.builtin.command:
    argv:
      - curl
      - -fsSL
      - -o
      - /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
      - https://www.postgresql.org/media/keys/ACCC4CF8.asc
    creates: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
  become: true

- name: Add PGDG apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc]
      https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main
    filename: pgdg
    state: present
  become: true

- name: Install PostgreSQL {{ pg_version }}
  ansible.builtin.apt:
    name:
      - "postgresql-{{ pg_version }}"
      - "postgresql-client-{{ pg_version }}"
      - python3-psycopg2
    state: present
    update_cache: true
  become: true

- name: Initialize PostgreSQL cluster
  ansible.builtin.command:
    argv:
      - pg_createcluster
      - "{{ pg_version }}"
      - main
    creates: "/var/lib/postgresql/{{ pg_version }}/main/PG_VERSION"
  become: true

- name: Deploy postgresql.conf tuning
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0644"
  become: true
  notify: restart postgresql

- name: Deploy pg_hba.conf (allow benchuser from any host)
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  become: true
  notify: reload postgresql

- name: Ensure postgres user is in ssl-cert group (required to read snakeoil SSL key)
  ansible.builtin.user:
    name: postgres
    groups: ssl-cert
    append: true
  become: true

- name: Start and enable PostgreSQL service
  block:
    - name: Reset any failed PostgreSQL service state
      ansible.builtin.command: systemctl reset-failed "{{ pg_service_name }}"
      become: true
      failed_when: false
      changed_when: false

    - name: Start and enable PostgreSQL service
      ansible.builtin.systemd:
        name: "{{ pg_service_name }}"
        state: started
        enabled: true
      become: true

  rescue:
    - name: Dump journal on service start failure
      ansible.builtin.command:
        argv:
          - journalctl
          - -u
          - "{{ pg_service_name }}"
          - --no-pager
          - -n
          - "100"
      become: true
      register: _pg_start_journal
      changed_when: false

    - name: Show journal on service start failure
      ansible.builtin.debug:
        var: _pg_start_journal.stdout_lines

    - name: Dump PostgreSQL log file on service start failure
      ansible.builtin.command:
        argv:
          - tail
          - -n
          - "100"
          - "/var/log/postgresql/postgresql-{{ pg_version }}-main.log"
      become: true
      register: _pg_start_logfile
      changed_when: false
      failed_when: false

    - name: Show PostgreSQL log file on service start failure
      ansible.builtin.debug:
        var: _pg_start_logfile.stdout_lines

    - name: Fail after showing diagnostics
      ansible.builtin.fail:
        msg: >
          PostgreSQL service {{ pg_service_name }} failed to start.
          Check the journal and log output above for the real cause
          (config error, missing extension, SSL permissions, OOM, etc.).

- name: Flush handlers to apply configuration before creating DB objects
  ansible.builtin.meta: flush_handlers

- name: Wait for PostgreSQL socket to be available
  ansible.builtin.wait_for:
    path: /var/run/postgresql/.s.PGSQL.5432
    state: present
    delay: 2
    timeout: 60

- name: Create benchmark database
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    state: present

- name: Enable pg_stat_statements extension in benchmark database
  become: true
  become_user: postgres
  community.postgresql.postgresql_ext:
    name: pg_stat_statements
    db: "{{ db_name }}"
    state: present

- name: Create benchmark user
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    db: "{{ db_name }}"
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "ALL"
    state: present

- name: Grant public schema privileges to benchmark user
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    db: "{{ db_name }}"
    privs: ALL
    type: schema
    objs: public
    role: "{{ db_user }}"
    state: present
