---
# ansible/roles/haproxy/tasks/main.yml
# Installs and configures HAProxy on the lb node (SUT-C only).

# ── Install HAProxy ───────────────────────────────────────────────────────────

# On noble (24.04+) HAProxy 2.8 ships in the official Ubuntu repo.
# Remove any stale backport sources that may have been written by a previous
# run before the backport-distro guard was added, so that apt update succeeds.
- name: Remove stale HAProxy backport apt sources (non-backport distros)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/haproxy.list
    - /usr/share/keyrings/haproxy.gpg
  become: true
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_release not in haproxy_backport_distros

- name: Install prerequisite packages for HAProxy PPA
  ansible.builtin.apt:
    name:
      - software-properties-common
      - curl
      - ca-certificates
    state: present
    update_cache: true
  become: true

- name: Download HAProxy {{ haproxy_version }} signing key via curl
  ansible.builtin.shell:
    cmd: "curl -fsSL {{ haproxy_gpg_url }} -o /usr/share/keyrings/haproxy.gpg"
    creates: /usr/share/keyrings/haproxy.gpg
  become: true
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_release in haproxy_backport_distros

- name: Add HAProxy {{ haproxy_version }} apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/haproxy.list
    content: |
      deb [signed-by=/usr/share/keyrings/haproxy.gpg] {{ haproxy_repo_url }} {{ ansible_distribution_release }}-backports-{{ haproxy_version }} main
    owner: root
    group: root
    mode: "0644"
  become: true
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_release in haproxy_backport_distros

- name: Update apt cache after adding HAProxy repository
  ansible.builtin.apt:
    update_cache: true
  become: true
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_release in haproxy_backport_distros

- name: Install haproxy
  ansible.builtin.apt:
    name: "haproxy={{ haproxy_version }}.*"
    state: present
    update_cache: true
  become: true

# ── Configuration ─────────────────────────────────────────────────────────────

- name: Ensure HAProxy config directory exists
  ansible.builtin.file:
    path: /etc/haproxy
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy haproxy.cfg
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ haproxy_config_file }}"
    owner: root
    group: root
    mode: "0644"
    validate: "haproxy -c -f %s"
  become: true
  notify: reload haproxy

# ── Systemd service ───────────────────────────────────────────────────────────

- name: Enable and start HAProxy service
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Wait for HAProxy to open port {{ haproxy_frontend_port }}
  ansible.builtin.wait_for:
    port: "{{ haproxy_frontend_port }}"
    timeout: 30
