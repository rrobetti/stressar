---
# ansible/roles/bench_control/defaults/main.yml

# Java minimum version required on the control node.
bench_java_min_version: 11

# Number of parallel bench JVM replicas to launch.
bench_replica_count: 4

# Workload configuration defaults (overridden in run_benchmarks.yml vars).
bench_target_rps:        500
bench_warmup_seconds:    300
bench_duration_seconds:  1800
bench_cooldown_seconds:  120
bench_workload_type:     "W2_MIXED"
bench_connection_mode:   "OJP"
bench_db_connection_budget: 19
