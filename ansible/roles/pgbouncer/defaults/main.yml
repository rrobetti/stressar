---
# ansible/roles/pgbouncer/defaults/main.yml

pgbouncer_config_dir:    "/etc/pgbouncer"
pgbouncer_config_file:   "/etc/pgbouncer/pgbouncer.ini"
pgbouncer_userlist_file: "/etc/pgbouncer/userlist.txt"
pgbouncer_port:          6432
# Production default: 16 per node × 3 pgBouncer nodes = 48 total backend
# PostgreSQL connections.
# Override in group_vars/all.yml or with -e pgbouncer_pool_size=<N>.
pgbouncer_pool_size:     6
# Pre-warm all server connections at startup so pg_stat_activity shows the full
# backend count from the very first benchmark request.
pgbouncer_min_pool_size: 6
pgbouncer_max_client_conn: 2000
pgbouncer_reserve_pool_size: 0
pgbouncer_reserve_pool_timeout: 5
pgbouncer_pool_mode:     "transaction"
