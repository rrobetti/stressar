---
# ansible/roles/ojp_proxy/defaults/main.yml

ojp_install_dir:  "/opt/ojp"
ojp_server_port:  1059
ojp_log_file:     "/var/log/ojp-server.log"
ojp_server_virtual_threads_enabled: false
# Slow query segregation is enabled by default — see ansible/group_vars/ojp.yml
# and docs/RATIONALE.md Appendix B for the rationale.
ojp_server_slow_query_segregation_enabled: true
java_package:     "temurin-25-jdk"
