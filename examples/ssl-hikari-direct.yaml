# SSL/TLS – HikariCP Direct Connection Example
#
# Demonstrates enabling SSL on a HIKARI_DIRECT connection to PostgreSQL.
# The SSL settings are forwarded to the PostgreSQL JDBC driver as
# DataSource properties so all pooled connections are encrypted.
#
# Prerequisites (PostgreSQL server side):
#   1. ssl = on                      # in postgresql.conf
#   2. ssl_cert_file = 'server.crt'  # server certificate
#   3. ssl_key_file  = 'server.key'  # server private key
#   4. pg_hba.conf entry with "hostssl" for the benchmark user
#
# Quick-start: minimum config for server-authenticated TLS
#   ssl:
#     enabled: true
#     mode: REQUIRE
#
# mTLS (client certificate): use mode VERIFY_FULL and set the three
# certificate path fields below.
#
# Run with:
#   bench run --config ssl-hikari-direct.yaml --output results/ssl-hikari/

database:
  jdbcUrl: "jdbc:postgresql://db.example.com:5432/benchdb"
  username: "benchuser"
  password: "${DB_PASSWORD}"   # Set via environment variable

  # ── SSL configuration ────────────────────────────────────────────────────
  ssl:
    # Enable SSL/TLS on every connection in the pool
    enabled: true

    # Enforcement / verification level (see docs/SSL_ANALYSIS.md for guidance)
    #   DISABLE     – plaintext only (no SSL)
    #   ALLOW       – plaintext preferred, SSL if server requires
    #   PREFER      – SSL preferred, plaintext fallback (JDBC default)
    #   REQUIRE     – SSL required, server cert NOT verified
    #   VERIFY_CA   – SSL required, server cert verified against CA
    #   VERIFY_FULL – SSL required, cert AND hostname verified (recommended)
    mode: VERIFY_FULL

    # Path to the trusted CA certificate used to verify the server.
    # Required for VERIFY_CA and VERIFY_FULL modes.
    rootCertPath: "/etc/ssl/certs/db-ca.pem"

    # Client certificate and key for mutual TLS (mTLS).
    # Leave commented out if server-only authentication is sufficient.
    # certPath: "/etc/ssl/certs/client.pem"
    # keyPath:  "/etc/ssl/private/client.key"
  # ─────────────────────────────────────────────────────────────────────────

connectionMode: HIKARI_DIRECT
poolSize: 20

workload:
  type: W1_READ_ONLY
  openLoop: true
  targetRps: 1000
  warmupSeconds: 300
  durationSeconds: 600
  cooldownSeconds: 120
  repeatCount: 5
  queryAPercent: 0.30
  useZipf: false
  seed: 42

numAccounts: 10000
numItems: 5000
numOrders: 50000
metricsIntervalSeconds: 1
outputDir: "results"

sweepIncrementPercent: 15.0
sloP95Ms: 50
errorRateThreshold: 0.001
