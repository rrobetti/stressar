# Test A / Test B — HikariCP Disciplined Baseline with TLS
#
# This is the upper-bound baseline for the OJP vs PgBouncer comparison.
# 16 independent bench JVM processes (8 on LG, 8 on APP) each simulate one
# microservice replica.  Every connection uses TLS (VERIFY_FULL).
#
# Connection budget: 300 total / 16 replicas = 19 connections per replica.
# Aggregate target: 16 × 63 RPS ≈ 1,000 RPS.
#
# Prerequisites:
#   - PostgreSQL configured with ssl=on and a valid server certificate
#   - pg_hba.conf uses "hostssl" (not "host") for benchuser
#   - CA certificate deployed at /etc/ssl/certs/db-ca.pem on LG and APP
#
# Run with (execute on LG and APP simultaneously):
#   for i in {0..7}; do
#     bench run --config ta-baseline-hikari-tls.yaml --instance-id $i \
#       --output results/sut-a-baseline/ &
#   done
#   wait
#
# See docs/BENCHMARKING_GUIDE.md § SUT-A for full instructions.

database:
  jdbcUrl: "jdbc:postgresql://<DB_IP>:5432/benchdb"
  username: "benchuser"
  password: "${DB_PASSWORD}"

  # ── TLS — mandatory; must match pg_hba.conf hostssl entries ─────────────────
  ssl:
    enabled: true
    mode: VERIFY_FULL
    rootCertPath: "/etc/ssl/certs/db-ca.pem"
    # Uncomment for mTLS (client certificate authentication):
    # certPath: "/etc/ssl/certs/client.pem"
    # keyPath:  "/etc/ssl/private/client.key"
  # ─────────────────────────────────────────────────────────────────────────────

connectionMode: HIKARI_DISCIPLINED
dbConnectionBudget: 300      # Total connections across all 16 replicas
replicas: 16                  # Must match the number of --instance-id values started
maxPoolSizePerReplica: 19     # 300 / 16 ≈ 19 connections per replica

workload:
  type: W2_MIXED
  openLoop: true
  targetRps: 63              # Per-replica; 16 × 63 ≈ 1,000 RPS aggregate
  warmupSeconds: 300
  durationSeconds: 600
  cooldownSeconds: 120
  repeatCount: 5
  writePercent: 0.20
  useZipf: false
  seed: 42

numAccounts: 1000000
numItems:    100000
numOrders:   10000000

metricsIntervalSeconds: 1
outputDir: "results/sut-a-baseline"

sweepIncrementPercent: 15.0  # Used by 'bench sweep' for Test A (capacity sweep)
sloP95Ms: 50
errorRateThreshold: 0.001
