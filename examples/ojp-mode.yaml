# OJP (Open JDBC Pooler) Gateway Configuration
# Uses OJP for server-side connection pooling
# Client maintains minimal connections (poolSize: 2)
#
# Prerequisites:
#   - OJP gateway must be running
#   - Database URL should point to OJP endpoint (not directly to PostgreSQL)
#
# Run with:
#   bench run --config ojp-mode.yaml --output results/ojp/

database:
  # Point to OJP gateway endpoint (not directly to PostgreSQL)
  jdbcUrl: "jdbc:postgresql://ojp-gateway:5432/benchdb"
  username: "benchuser"
  password: "benchpass"

# Connection mode: OJP
connectionMode: OJP

# Pool configuration
# Use minimal client-side connections since OJP handles server-side pooling
poolSize: 2

# Workload configuration
workload:
  type: W2_READ_WRITE
  openLoop: true
  targetRps: 1000
  
  # Phase durations
  warmupSeconds: 300
  durationSeconds: 600
  cooldownSeconds: 120
  repeatCount: 5
  
  # Parameter distribution
  useZipf: false
  seed: 42

# Data generation (must match init-db settings)
numAccounts: 10000
numItems: 5000
numOrders: 50000

# Metrics
metricsIntervalSeconds: 1

# Output
outputDir: "results"

# Sweep configuration (if using sweep command)
sweepIncrementPercent: 15.0
sloP95Ms: 50
errorRateThreshold: 0.001
