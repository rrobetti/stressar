# W4 OLAP Workload Configuration
# Pure analytical workload — 5 index-aware heavy queries in round-robin order.
#
# Queries focus on recent time windows so they remain realistic for production
# systems (which typically rely on indexes), while still doing meaningful
# aggregation, joins, and window work.
#
# Query mix (round-robin, equal weight):
#   Q1 — Daily revenue over recent history
#   Q2 — Top customers from recent orders
#   Q3 — Item performance for recent orders
#   Q4 — Order status distribution over recent history
#   Q5 — Account running totals on recent orders
#
# Target RPS stays moderate because analytical queries still carry real weight.
#
# Run with:
#   bench run --config w4-olap.yaml --output results/w4/

database:
  jdbcUrl: "jdbc:postgresql://localhost:5432/benchdb"
  username: "benchuser"
  password: "benchpass"

connectionMode: HIKARI_DIRECT
poolSize: 50  # Larger pool to keep analytical queries in flight concurrently

workload:
  type: W4_OLAP
  openLoop: true
  targetRps: 50  # Moderate RPS — analytical but tuned to allow more concurrency

  # Phase durations
  warmupSeconds: 120
  durationSeconds: 600
  cooldownSeconds: 60

  # Parameter distribution (not used by OLAP queries — kept for consistency)
  useZipf: false
  seed: 42

# Data generation (must match init-db settings)
numAccounts: 10000
numItems: 5000
numOrders: 50000

# Metrics
metricsIntervalSeconds: 1

# Output
outputDir: "results"

# SLO thresholds — much more relaxed than OLTP due to query weight
sweepIncrementPercent: 10.0
sloP95Ms: 10000   # 10 s p95 is acceptable for analytical queries
errorRateThreshold: 0.001
