# W3 Slow Query Workload Configuration
# W3_SLOW_QUERY = W2_MIXED operations + a slow analytical query layer.
# At each operation: 10% → slow path (heavy join/aggregate);
#                    90% → W2_MIXED (read/write OLTP).
#
# Query Mix:
#   - Slow queries (10%): Complex aggregations over recent orders
#   - Fast queries (90%, W2_MIXED):
#       - Writes (20%): Insert order + lines + update total
#       - Reads (80%): 30% QueryA (account lookup), 70% QueryB (last 20 orders)
#
# The 10% slow-query rate keeps several connections occupied concurrently,
# ensuring the pool operates under measurable pressure throughout the benchmark.
#
# Run with:
#   bench run --config w3-slow-query.yaml --output results/w3/

database:
  jdbcUrl: "jdbc:postgresql://localhost:5432/benchdb"
  username: "benchuser"
  password: "benchpass"

# Connection mode
connectionMode: HIKARI_DIRECT
poolSize: 50  # Higher pool size to handle slow queries

# Workload configuration
workload:
  type: W3_SLOW_QUERY
  openLoop: true
  targetRps: 200  # Lower RPS due to slow queries
  
  # Phase durations
  warmupSeconds: 300
  durationSeconds: 600
  cooldownSeconds: 120
  repeatCount: 5
  
  # Workload mix for W3_SLOW_QUERY
  slowQueryPercent: 0.10  # 10% slow queries; remaining 90% uses W2_MIXED distribution
  queryAPercent: 0.30     # Of the fast 90%: 30% QueryA (account lookup)
  writePercent: 0.20      # Of the fast 90%: 20% writes (insert order + lines)
  
  # Parameter distribution
  useZipf: false
  seed: 42

# Data generation (must match init-db settings)
numAccounts: 10000
numItems: 5000
numOrders: 50000

# Metrics
metricsIntervalSeconds: 1

# Output
outputDir: "results"

# Sweep configuration (if using sweep command)
sweepIncrementPercent: 10.0  # Slower increment due to slow queries
sloP95Ms: 100  # More relaxed SLO for slow query workload
errorRateThreshold: 0.001
