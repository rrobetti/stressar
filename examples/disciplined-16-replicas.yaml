# Disciplined Pooling with 16 Replicas
# Connection budget: 100 total DB connections
# Per-replica pool size: 100 / 16 = 6 connections
#
# Run with:
#   for i in {0..15}; do
#     bench run --config disciplined-16-replicas.yaml --instance-id $i --output results/disciplined/ &
#   done
#   wait

database:
  jdbcUrl: "jdbc:postgresql://localhost:5432/benchdb"
  username: "benchuser"
  password: "benchpass"

# Connection mode: Disciplined pooling with connection budget
connectionMode: HIKARI_DISCIPLINED

# Disciplined pooling configuration
dbConnectionBudget: 100  # Total connections across all replicas
replicas: 16             # Number of concurrent replicas
maxPoolSizePerReplica: 50  # Safety limit per replica

# Workload configuration
workload:
  type: W2_MIXED
  openLoop: true
  targetRps: 500  # Per replica: 500 RPS × 16 = 8000 total RPS
  
  # Phase durations
  warmupSeconds: 300
  durationSeconds: 600
  cooldownSeconds: 120
  repeatCount: 5
  
  # Workload mix
  queryAPercent: 0.30  # 30% account lookups
  writePercent: 0.20   # 20% order creation transactions
  # Remaining 50% = recent orders query
  
  # Parameter distribution
  useZipf: false  # Uniform distribution
  seed: 42

# Data generation (must match init-db settings)
numAccounts: 10000
numItems: 5000
numOrders: 50000

# Metrics
metricsIntervalSeconds: 1

# Output
outputDir: "results"

# Sweep configuration (if using sweep command)
sweepIncrementPercent: 15.0
sloP95Ms: 50
errorRateThreshold: 0.001
