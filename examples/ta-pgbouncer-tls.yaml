# Test A / Test B — PgBouncer (3 nodes + HAProxy) with TLS
#
# 16 independent bench JVM processes (8 on LG, 8 on APP) connect through an
# HAProxy load balancer to 3 PgBouncer instances in transaction-pooling mode.
# HAProxy operates in TCP passthrough mode — it does NOT terminate TLS.
# TLS is terminated at each PgBouncer instance.
#
# Network legs:
#   Client → HAProxy   : TCP passthrough (HAProxy does not see plaintext)
#   HAProxy → PgBouncer: TLS (port 6432)
#   PgBouncer → PostgreSQL : TLS (port 5432)
#
# Prerequisites:
#   - HAProxy configured in TCP passthrough mode (see docs/install/HAPROXY.md)
#   - PgBouncer instances configured with client_tls_sslmode=require
#     and server_tls_sslmode=verify-full (see docs/BENCHMARKING_GUIDE.md § 5)
#   - PostgreSQL configured with ssl=on and pg_hba.conf using "hostssl"
#
# ssl.mode = REQUIRE means the JDBC driver enforces TLS but does not verify the
# PgBouncer server certificate against a CA.  Upgrade to VERIFY_FULL once a CA
# certificate is available for PgBouncer's server certificate.
#
# Run with (execute on LG and APP simultaneously):
#   for i in {0..7}; do
#     bench run --config ta-pgbouncer-tls.yaml --instance-id $i \
#       --output results/sut-c-pgbouncer/ &
#   done
#   wait
#
# See docs/BENCHMARKING_GUIDE.md § SUT-C for full instructions.

database:
  # URL points to HAProxy load balancer (distributes across 3 × PgBouncer)
  jdbcUrl: "jdbc:postgresql://<LB_IP>:6432/benchdb"
  username: "benchuser"
  password: "${DB_PASSWORD}"

  # ── TLS — client→PgBouncer leg ───────────────────────────────────────────────
  ssl:
    enabled: true
    # VERIFY_FULL verifies the PgBouncer server certificate AND hostname.
    # Requires the bench CA cert to be deployed on LG and APP.
    mode: VERIFY_FULL
    rootCertPath: "/etc/ssl/certs/db-ca.pem"
    # Fall back to REQUIRE only if a CA cert for PgBouncer is not yet available:
    # mode: REQUIRE
  # ─────────────────────────────────────────────────────────────────────────────

connectionMode: PGBOUNCER
poolSize: 2    # Minimal client-side connections; PgBouncer holds the real backend pool

workload:
  type: W2_MIXED
  openLoop: true
  targetRps: 63              # Per-replica; 16 × 63 ≈ 1,000 RPS aggregate
  warmupSeconds: 300
  durationSeconds: 600
  cooldownSeconds: 120
  repeatCount: 5
  writePercent: 0.20
  useZipf: false
  seed: 42

numAccounts: 1000000
numItems:    100000
numOrders:   10000000

metricsIntervalSeconds: 1
outputDir: "results/sut-c-pgbouncer"

sweepIncrementPercent: 15.0  # Used by 'bench sweep' for Test A (capacity sweep)
sloP95Ms: 50
errorRateThreshold: 0.001
